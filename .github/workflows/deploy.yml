name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ai-driver-copilot
  REGION:       asia-southeast1
  REPO_NAME:    ai-driver-copilot

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1 — LINT & TEST
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests (skip if none)
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests — skipping"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — BUILD & DEPLOY (main branch only)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Create Artifact Registry repository (if needed)
        run: |
          gcloud artifacts repositories describe $REPO_NAME \
            --location=$REGION 2>/dev/null || \
          gcloud artifacts repositories create $REPO_NAME \
            --repository-format=docker \
            --location=$REGION \
            --description="AI Driver Copilot Docker images"

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:$GITHUB_SHA \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:$GITHUB_SHA
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:$GITHUB_SHA \
            --platform=managed \
            --region=$REGION \
            --allow-unauthenticated \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60 \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }},ONEMAP_EMAIL=${{ secrets.ONEMAP_EMAIL }},ONEMAP_PASSWORD=${{ secrets.ONEMAP_PASSWORD }},WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}"

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform=managed \
            --region=$REGION \
            --format="value(status.url)")
          echo "✅ DEPLOYED: $URL"
          echo "📋 HEALTH:   $URL/health"
          echo "📖 DOCS:     $URL/docs"

      - name: Health check
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform=managed \
            --region=$REGION \
            --format="value(status.url)")
          sleep 15
          curl --fail --silent "$URL/health" && echo "✅ Health check passed" || echo "⚠️ Check Cloud Run logs"
